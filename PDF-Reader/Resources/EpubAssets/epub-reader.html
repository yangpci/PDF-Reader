<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPUB</title>
  <style>
    html, body { margin: 0; height: 100%; background: #29293d; }
    #epubViewer { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="epubViewer"></div>
  <script>
    window.setEpubChromeBackground = (hex) => {
      const c = (typeof hex === 'string' && /^#[0-9A-Fa-f]{6}$/.test(hex)) ? hex : '#29293d';
      document.documentElement.style.background = c;
      document.body.style.background = c;
    };
  </script>
  <script type="module">
    import epubModule from './epub-browser.mjs';
    // 打包结果为 export default require_epub()，实际是 { default: ePub, Book, ... }，需取 .default
    const ePubFactory = typeof epubModule === 'function' ? epubModule : epubModule.default;

    let book = null;
    let rendition = null;
    const mount = document.getElementById('epubViewer');

    function post(msg) {
      try {
        window.webkit.messageHandlers.epubBridge.postMessage(msg);
      } catch (e) {}
    }

    window.loadEpubFromFile = async (filename, startCfi) => {
      try {
        post({ type: 'status', text: '正在打开 EPUB…' });
        const res = await fetch('./' + filename);
        if (!res.ok) throw new Error('fetch ' + filename + ' ' + res.status);
        const buf = await res.arrayBuffer();
        if (book) { try { book.destroy(); } catch (e) {} book = null; }
        if (rendition) { try { rendition.destroy(); } catch (e) {} rendition = null; }
        mount.innerHTML = '';

        book = ePubFactory(buf, { replacements: 'blobUrl' });
        await book.ready;

        rendition = book.renderTo(mount, {
          width: '100%',
          height: '100%',
          flow: 'paginated',
          spread: 'auto'
        });

        rendition.on('relocated', () => {
          const loc = rendition.currentLocation?.();
          const cfi = loc?.start?.cfi;
          const cur = loc?.start?.displayed?.page;
          const total = loc?.start?.displayed?.total;
          post({
            type: 'location',
            cfi,
            page: cur,
            total: total,
            spineIndex: loc?.start?.index,
            href: loc?.start?.href
          });
        });

        const pct = window.__epubFontPercent || 110;
        try { rendition.themes.fontSize(`${pct}%`); } catch (e) {}
        await rendition.display(startCfi || undefined);
        post({ type: 'ready' });
        const loc2 = rendition.currentLocation?.();
        post({
          type: 'location',
          cfi: loc2?.start?.cfi,
          page: loc2?.start?.displayed?.page,
          total: loc2?.start?.displayed?.total,
          spineIndex: loc2?.start?.index,
          href: loc2?.start?.href
        });
      } catch (e) {
        post({ type: 'error', message: e && e.message ? e.message : String(e) });
      }
    };

    window.epubNext = () => { try { rendition?.next?.(); } catch (e) {} };
    window.epubPrev = () => { try { rendition?.prev?.(); } catch (e) {} };
    window.epubDisplayHref = (href) => {
      try { rendition?.display?.(href); } catch (e) { post({ type: 'error', message: String(e) }); }
    };
    window.epubDisplayCFI = (cfi) => {
      try { rendition?.display?.(cfi); } catch (e) { post({ type: 'error', message: String(e) }); }
    };
    window.setEpubFontPercent = (p) => {
      const n = Number(p);
      window.__epubFontPercent = Number.isFinite(n) ? n : 110;
      try { rendition?.themes?.fontSize(`${window.__epubFontPercent}%`); } catch (e) {}
    };
    window.destroyEpub = () => {
      try { rendition?.destroy?.(); } catch (e) {}
      try { book?.destroy?.(); } catch (e) {}
      rendition = null;
      book = null;
      mount.innerHTML = '';
    };

    const chapterTitleForSpineIndex = (spineIndex, toc) => {
      if (spineIndex == null || spineIndex < 0 || !toc?.length) return null;
      let bestIndex = -1;
      let bestTitle = null;
      for (const entry of toc) {
        const idx = entry.spineIndex ?? -1;
        if (idx < 0 || idx > spineIndex) continue;
        if (idx > bestIndex || idx === bestIndex) {
          bestIndex = idx;
          bestTitle = entry.title;
        }
      }
      return bestTitle;
    };

    const chapterTitleForCfi = async (cfi) => {
      if (!book) return null;
      try {
        await book.ready;
        await book.loaded.navigation;
        const toc = await getEpubNavToc();
        if (!toc.length) return null;
        let spineIndex = -1;
        if (cfi) {
          const section = book.spine.get(cfi);
          if (section != null && section.index != null) spineIndex = section.index;
        }
        if (spineIndex < 0 && rendition) {
          const loc = rendition.currentLocation?.();
          if (loc?.start?.index != null) spineIndex = loc.start.index;
        }
        return chapterTitleForSpineIndex(spineIndex, toc);
      } catch (e) {
        return null;
      }
    };

    window.getEpubNavToc = async () => {
      if (!book) return [];
      try {
        await book.loaded.navigation;
        await book.ready;
        const root = book.navigation?.toc || [];
        const out = [];
        const walk = (nodes) => {
          for (const n of nodes || []) {
            if (n.label && n.href) {
              const title = String(n.label).replace(/<[^>]*>/gi, '').trim();
              if (title) {
                let spineIndex = -1;
                try {
                  const section = book.spine.get(String(n.href).split('#')[0]);
                  if (section != null && section.index != null) spineIndex = section.index;
                } catch (e) {}
                out.push({ title, href: n.href, spineIndex });
              }
            }
            if (n.subitems && n.subitems.length) walk(n.subitems);
          }
        };
        walk(root);
        return out.filter((x) => x.href);
      } catch (e) {
        return [];
      }
    };

    window.__epubNavTocJson = async () => JSON.stringify(await getEpubNavToc());

    window.__epubChapterTitleForCfiJson = async (cfi) => {
      const title = await chapterTitleForCfi(cfi);
      let spineIndex = -1;
      if (cfi && book?.spine) {
        try {
          const section = book.spine.get(cfi);
          if (section?.index != null) spineIndex = section.index;
        } catch (e) {}
      }
      return JSON.stringify({ title, spineIndex });
    };

    window.__epubResolveBookmarksJson = async (cfisJson) => {
      const cfis = JSON.parse(cfisJson || '[]');
      const toc = await getEpubNavToc();
      const out = [];
      for (const cfi of cfis) {
        if (!cfi) continue;
        let spineIndex = -1;
        try {
          const section = book?.spine?.get?.(cfi);
          if (section?.index != null) spineIndex = section.index;
        } catch (e) {}
        const title = chapterTitleForSpineIndex(spineIndex, toc);
        out.push({ cfi, title, spineIndex });
      }
      return JSON.stringify(out);
    };

    post({ type: 'jsReady' });
  </script>
</body>
</html>
